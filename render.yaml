services:
  - type: web
    name: kabooz-backend
    runtime: java
    region: singapore  # closest to India; change to oregon if needed
    plan: free          # upgrade to starter ($7/mo) for always-on

    # Render builds the JAR with Maven, then starts it
    buildCommand: mvn -B -DskipTests clean package
    startCommand: java -Dserver.port=$PORT -jar target/kabooz-backend-1.0.0.jar

    healthCheckPath: /api/health

    envVars:
      # ── Database ───────────────────────────────────────────────
      - key: DATABASE_URL
        sync: false  # set manually in Render dashboard

      # ── JWT ────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false  # 64-char hex secret — set in Render dashboard

      - key: JWT_EXPIRATION
        value: "86400000"  # 24 hours

      # ── Admin seed credentials ─────────────────────────────────
      - key: ADMIN_DEFAULT_USERNAME
        sync: false  # set in Render dashboard

      - key: ADMIN_DEFAULT_PASSWORD
        sync: false  # set in Render dashboard (your strong password)

      # ── CORS ───────────────────────────────────────────────────
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # e.g. https://kabooz.in,https://admin.kabooz.in

      # ── Brute-force protection ─────────────────────────────────
      - key: AUTH_MAX_FAILED_ATTEMPTS
        value: "5"

      - key: AUTH_LOCKOUT_DURATION_MINUTES
        value: "15"

      - key: ADMIN_IDLE_TIMEOUT_SECONDS
        value: "600"
