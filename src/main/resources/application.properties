# Spring Boot Application Properties
# All secrets are injected via environment variables (Render / local .env)
# ================================================================

# ----- Server -----
server.port=${PORT:8080}
server.error.include-message=never
server.error.include-stacktrace=never

# ----- DataSource (PostgreSQL — Supabase pooler) -----
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# ----- JPA / Hibernate -----
# validate = trust Supabase-managed schema; never drop/re-create in production.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Disable schema.sql / data.sql auto-run (schema managed on Supabase directly)
spring.sql.init.mode=never

# ----- JWT -----
# Must be a hex-encoded 256-bit (64-char) string set via environment variable
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ----- Admin Session / Idle Timeout -----
admin.idle.timeout.seconds=${ADMIN_IDLE_TIMEOUT_SECONDS:600}

# ----- Brute-Force Protection -----
auth.max.failed.attempts=${AUTH_MAX_FAILED_ATTEMPTS:5}
auth.lockout.duration.minutes=${AUTH_LOCKOUT_DURATION_MINUTES:15}

# ----- Default Admin Credentials (Seeded on Startup) -----
# These are read once at startup by DatabaseSeeder.java
admin.default.username=${ADMIN_DEFAULT_USERNAME:admin}
admin.default.password=${ADMIN_DEFAULT_PASSWORD}

# ----- CORS -----
# Comma-separated list of allowed frontend origins
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ----- Logging (less verbose in production) -----
logging.level.com.kabooz=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ----- Multipart -----
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ----- Jackson -----
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.time-zone=Asia/Kolkata
